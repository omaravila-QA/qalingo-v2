<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QALingo — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#070D08;--bg2:#0C1510;--bg3:#111E14;--bg4:#182619;
  --card:#0C1510;--border:rgba(34,197,94,.11);--border2:rgba(34,197,94,.28);
  --text:#F0F0F0;--text2:#7A9A7C;--text3:#334D36;
  --g:#22C55E;--gh:#16A34A;--gdim:rgba(34,197,94,.08);
  --red:#EF4444;--shadow:rgba(0,0,0,.6);--navbg:rgba(7,13,8,.97);
  --grid:rgba(34,197,94,.022);
}
[data-theme="light"]{
  --bg:#F4F6F4;--bg2:#E8EDE8;--bg3:#DCE3DC;--bg4:#CDD5CD;
  --card:#FFF;--border:rgba(22,163,74,.13);--border2:rgba(22,163,74,.32);
  --text:#0A1C0C;--text2:#3A5540;--text3:#7A8E7C;
  --g:#16A34A;--gh:#15803D;--gdim:rgba(22,163,74,.07);
  --red:#DC2626;--shadow:rgba(0,0,0,.07);--navbg:rgba(244,246,244,.97);
  --grid:rgba(22,163,74,.03);
}
[data-theme="hc"]{
  --bg:#000;--bg2:#050505;--bg3:#0D0D0D;--bg4:#141414;
  --card:#030303;--border:rgba(74,222,128,.32);--border2:rgba(74,222,128,.6);
  --text:#FFF;--text2:#D0D0D0;--text3:#888;
  --g:#4ADE80;--gh:#22C55E;--gdim:rgba(74,222,128,.10);
  --red:#F87171;--shadow:rgba(0,0,0,.9);--navbg:rgba(0,0,0,.99);
  --grid:rgba(74,222,128,.04);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:"Roboto",sans-serif;font-size:16px;line-height:1.6;
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px 20px env(safe-area-inset-bottom,24px);
  transition:background .3s,color .3s;
  position:relative;overflow:hidden;
}

/* grid bg */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:50px 50px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%);
}
.glow{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);width:500px;height:400px;background:radial-gradient(ellipse,rgba(34,197,94,.05),transparent 70%);pointer-events:none;z-index:0;}

/* theme toggle */
.tog{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:2px;}
.tog-btn{padding:4px 9px;border-radius:99px;border:none;background:transparent;color:var(--text3);font-family:"Space Mono",monospace;font-size:9px;cursor:pointer;transition:all .2s;}
.tog-btn.on{background:var(--g);color:#fff;}

/* card */
.auth-card{
  width:100%;max-width:400px;
  background:var(--card);border-radius:24px;
  border:1px solid var(--border2);
  padding:32px 28px;
  position:relative;z-index:1;
  box-shadow:0 24px 64px var(--shadow);
  animation:up .5s ease both;
}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* logo */
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;}
.logo-q{width:38px;height:38px;border-radius:10px;background:var(--g);display:flex;align-items:center;justify-content:center;font-family:"Space Mono",monospace;font-size:19px;font-weight:700;color:#fff;box-shadow:0 0 16px rgba(34,197,94,.3);}
.logo-w{font-family:"Space Mono",monospace;font-size:20px;font-weight:700;color:var(--text);}

/* tabs */
.auth-tabs{display:flex;background:var(--bg3);border-radius:12px;padding:3px;margin-bottom:24px;}
.tab-btn{flex:1;padding:9px;border-radius:10px;border:none;background:transparent;font-family:"Space Mono",monospace;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .2s;letter-spacing:.5px;}
.tab-btn.on{background:var(--g);color:#fff;}

/* form */
.form{display:flex;flex-direction:column;gap:14px;}
.field-wrap{display:flex;flex-direction:column;gap:5px;}
.field-label{font-family:"Space Mono",monospace;font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.field-input{
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:12px;padding:13px 16px;
  font-family:"Roboto",sans-serif;font-size:15px;color:var(--text);
  outline:none;transition:border-color .2s;width:100%;
}
.field-input::placeholder{color:var(--text3);}
.field-input:focus{border-color:var(--border2);}
.field-input.error{border-color:rgba(239,68,68,.5);}
.field-error{font-family:"Space Mono",monospace;font-size:10px;color:var(--red);display:none;}
.field-error.show{display:block;}

/* password field */
.pw-wrap{position:relative;}
.pw-wrap .field-input{padding-right:44px;}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;}

/* forgot */
.forgot{font-family:"Space Mono",monospace;font-size:10px;color:var(--text3);text-align:right;text-decoration:none;transition:color .2s;}
.forgot:hover{color:var(--g);}

/* divider */
.divider{display:flex;align-items:center;gap:12px;margin:4px 0;}
.div-line{flex:1;height:1px;background:var(--border);}
.div-text{font-family:"Space Mono",monospace;font-size:10px;color:var(--text3);}

/* social btns */
.social-btn{
  width:100%;padding:13px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--bg3);
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:14px;font-weight:500;color:var(--text);cursor:pointer;
  transition:all .2s;font-family:"Roboto",sans-serif;
}
.social-btn:hover{border-color:var(--border2);background:var(--bg4);}
.social-icon{font-size:18px;}

/* submit btn */
.submit-btn{
  width:100%;padding:15px;border-radius:13px;border:none;
  background:var(--g);color:#fff;font-size:16px;font-weight:700;
  font-family:"Roboto",sans-serif;cursor:pointer;
  box-shadow:0 0 24px rgba(34,197,94,.2);
  transition:all .2s;position:relative;overflow:hidden;
}
.submit-btn::before{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);animation:shim 3s ease-in-out infinite;}
@keyframes shim{0%{left:-100%}65%,100%{left:150%}}
.submit-btn:hover{background:var(--gh);box-shadow:0 0 40px rgba(34,197,94,.35);}
.submit-btn:disabled{background:var(--bg3);color:var(--text3);box-shadow:none;cursor:not-allowed;}

/* footer note */
.auth-note{text-align:center;margin-top:20px;font-size:12px;color:var(--text3);font-weight:300;}
.auth-note a{color:var(--g);text-decoration:none;}

/* Q quote */
.q-note{
  width:100%;max-width:400px;
  display:flex;align-items:center;gap:10px;
  margin-top:16px;
  font-family:"Space Mono",monospace;font-size:10px;color:var(--text3);
  font-style:italic;position:relative;z-index:1;
  animation:up .5s ease .1s both;
}
.q-note em{font-style:normal;color:var(--g);}
</style>
</head>
<body>
<div class="glow" aria-hidden="true"></div>

<!-- Theme toggle -->
<div class="tog">
  <button class="tog-btn on" id="btn-dark"  onclick="setTheme('dark')">🌙</button>
  <button class="tog-btn"    id="btn-light" onclick="setTheme('light')">☀️</button>
  <button class="tog-btn"    id="btn-hc"    onclick="setTheme('hc')">◉</button>
</div>

<div class="auth-card">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="logo-q">Q</div>
    <span class="logo-w">QALingo</span>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="tab-btn on" id="tab-login"  onclick="switchTab('login')">Login</button>
    <button class="tab-btn"    id="tab-signup" onclick="switchTab('signup')">Sign up</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="form">
      <div class="field-wrap">
        <label class="field-label">Email</label>
        <input class="field-input" type="email" placeholder="you@company.com" id="login-email">
        <span class="field-error" id="login-email-err">Please enter a valid email.</span>
      </div>
      <div class="field-wrap">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <label class="field-label">Password</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <div class="pw-wrap">
          <input class="field-input" type="password" placeholder="••••••••" id="login-pw">
          <button class="pw-toggle" onclick="togglePw('login-pw',this)" type="button">👁</button>
        </div>
        <span class="field-error" id="login-pw-err">Password is required.</span>
      </div>
      <button class="submit-btn" onclick="submitLogin()">Log in</button>
      <div class="divider"><div class="div-line"></div><div class="div-text">or</div><div class="div-line"></div></div>
      <button class="social-btn"><span class="social-icon">🔍</span> Continue with Google</button>
      <button class="social-btn"><span class="social-icon">🐙</span> Continue with GitHub</button>
    </div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="form-signup" style="display:none">
    <div class="form">
      <div class="field-wrap">
        <label class="field-label">Full name</label>
        <input class="field-input" type="text" placeholder="Omar A." id="su-name">
      </div>
      <div class="field-wrap">
        <label class="field-label">Email</label>
        <input class="field-input" type="email" placeholder="you@company.com" id="su-email">
      </div>
      <div class="field-wrap">
        <label class="field-label">Password</label>
        <div class="pw-wrap">
          <input class="field-input" type="password" placeholder="Min 8 characters" id="su-pw">
          <button class="pw-toggle" onclick="togglePw('su-pw',this)" type="button">👁</button>
        </div>
      </div>
      <!-- password strength -->
      <div id="pw-strength" style="display:none">
        <div style="display:flex;gap:4px;margin-bottom:4px;">
          <div id="ps1" style="flex:1;height:4px;border-radius:99px;background:var(--bg3);transition:background .3s;"></div>
          <div id="ps2" style="flex:1;height:4px;border-radius:99px;background:var(--bg3);transition:background .3s;"></div>
          <div id="ps3" style="flex:1;height:4px;border-radius:99px;background:var(--bg3);transition:background .3s;"></div>
          <div id="ps4" style="flex:1;height:4px;border-radius:99px;background:var(--bg3);transition:background .3s;"></div>
        </div>
        <div id="ps-label" style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);"></div>
      </div>
      <button class="submit-btn" onclick="submitSignup()">Create account — it's free</button>
      <div class="divider"><div class="div-line"></div><div class="div-text">or</div><div class="div-line"></div></div>
      <button class="social-btn"><span class="social-icon">🔍</span> Continue with Google</button>
    </div>
  </div>
</div>

<!-- Q quote -->
<div class="q-note">
  🕵️ <span id="q-quote">"Welcome back. <em>Let's find some bugs.</em>"</span>
</div>

<script>
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  ['dark','light','hc'].forEach(id=>{const b=document.getElementById('btn-'+id);if(b)b.classList.toggle('on',id===t);});
}
if(window.matchMedia('(prefers-color-scheme: light)').matches) setTheme('light');

function switchTab(tab){
  const isLogin = tab==='login';
  document.getElementById('tab-login').classList.toggle('on', isLogin);
  document.getElementById('tab-signup').classList.toggle('on', !isLogin);
  document.getElementById('form-login').style.display  = isLogin ? 'block' : 'none';
  document.getElementById('form-signup').style.display = isLogin ? 'none'  : 'block';
  document.getElementById('q-quote').innerHTML = isLogin
    ? '"Welcome back. <em>Let\'s find some bugs.</em>"'
    : '"New recruit. <em>QALemental, dear Watson.</em>"';
}

function togglePw(id, btn){
  const inp = document.getElementById(id);
  const show = inp.type==='password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

// Password strength
document.addEventListener('DOMContentLoaded',()=>{
  const pw = document.getElementById('su-pw');
  if(pw) pw.addEventListener('input',()=>{
    const v = pw.value;
    document.getElementById('pw-strength').style.display = v ? 'block' : 'none';
    const score = [v.length>=8, /[A-Z]/.test(v), /[0-9]/.test(v), /[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
    const colors = ['','#EF4444','#F59E0B','#22C55E','#22C55E'];
    const labels = ['','Weak','Fair','Good','Strong'];
    for(let i=1;i<=4;i++){
      document.getElementById('ps'+i).style.background = i<=score ? colors[score] : 'var(--bg3)';
    }
    document.getElementById('ps-label').style.color = colors[score]||'var(--text3)';
    document.getElementById('ps-label').textContent = labels[score]||'';
  });
});

function submitLogin(){
  const email = document.getElementById('login-email').value;
  const pw    = document.getElementById('login-pw').value;
  let ok = true;
  if(!email.includes('@')){ document.getElementById('login-email-err').classList.add('show'); document.getElementById('login-email').classList.add('error'); ok=false; }
  else { document.getElementById('login-email-err').classList.remove('show'); document.getElementById('login-email').classList.remove('error'); }
  if(!pw){ document.getElementById('login-pw-err').classList.add('show'); document.getElementById('login-pw').classList.add('error'); ok=false; }
  else { document.getElementById('login-pw-err').classList.remove('show'); document.getElementById('login-pw').classList.remove('error'); }
  if(ok) window.location.href='dashboard.html';
}

function submitSignup(){
  window.location.href='dashboard.html';
}
</script>
</body>
</html>
