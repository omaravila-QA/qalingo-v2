<!-- ══ 1. REEMPLAZA ESTE CSS (busca .bottom-nav en tu <style>) ══ -->
<style>
/* ═══ BOTTOM NAV REDISEÑADO ═══ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--navbg);backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;
  padding:10px 8px max(env(safe-area-inset-bottom,14px),14px);
  gap:4px;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:4px;cursor:pointer;
  text-decoration:none;padding:6px 4px;
  border-radius:12px;
  transition:all .2s ease;
  position:relative;
}
.nav-item:hover:not(.active){background:var(--gdim);}
.nav-item.active{background:var(--gdim);border:1px solid var(--border2);}

/* ICON WRAPPER */
.nav-icon-wrap{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  transition:all .2s ease;
  position:relative;
}
.nav-item.active .nav-icon-wrap{
  background:var(--g);
  box-shadow:0 4px 14px rgba(34,197,94,.35);
}
.nav-item:not(.active) .nav-icon-wrap{
  background:var(--bg3);
  filter:grayscale(.6) opacity(.6);
}
.nav-item:hover:not(.active) .nav-icon-wrap{
  filter:grayscale(0) opacity(.8);
  background:var(--bg4);
}

/* LABEL */
.nav-lbl{
  font-family:"Space Mono",monospace;
  font-size:8px;font-weight:700;letter-spacing:.3px;
  color:var(--text3);transition:color .2s;
  white-space:nowrap;
}
.nav-item.active .nav-lbl{color:var(--g);}
.nav-item:hover:not(.active) .nav-lbl{color:var(--text2);}

/* ACTIVE DOT */
.nav-pip{
  position:absolute;top:6px;right:8px;
  width:6px;height:6px;border-radius:50%;
  background:var(--g);
  box-shadow:0 0 6px var(--g);
  animation:pipPulse 2s infinite;
  display:none;
}
.nav-item.active .nav-pip{display:block;}
@keyframes pipPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* NOTIFICATION BADGE */
.nav-badge{
  position:absolute;top:4px;right:6px;
  min-width:16px;height:16px;
  background:var(--red);border-radius:99px;
  font-family:"Space Mono",monospace;font-size:8px;
  color:#fff;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  padding:0 4px;border:1.5px solid var(--bg);
}
</style>

<!-- ══ 2. REEMPLAZA EL HTML DEL <nav class="bottom-nav"> ══ -->
<nav class="bottom-nav" role="navigation" aria-label="Navigation">

  </a>
